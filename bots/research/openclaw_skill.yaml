name: naver-research
description: |
  네이버 금융 리서치 크롤링/요약/질문응답 스킬.
  매일 자동으로 종목분석/산업분석/시황정보/경제분석/채권분석을 수집하고 요약합니다.

  사용 예시:
  - "오늘 리서치 요약 보여줘" → 오늘 수집된 리포트 요약
  - "삼성전자 최근 한달 상향 몇건?" → 종목별 투자의견 집계
  - "삼성전자 리포트 조회" → 최근 리포트 상세
  - "신규 커버리지 종목은?" → 새로 분석 시작된 종목
  - "리서치 크롤링 실행해줘" → 수동 배치 실행

triggers:
  - "리서치"
  - "리포트"
  - "종목분석"
  - "산업분석"
  - "투자의견"
  - "목표주가"
  - "상향"
  - "하향"
  - "커버리지"

commands:
  today:
    description: "오늘 리포트 요약"
    command: "python C:\\workspace\\research_bot\\main.py --today"
    triggers: ["오늘 리서치", "오늘 리포트", "리서치 요약"]

  ticker:
    description: "특정 종목 리포트 조회"
    command: "python C:\\workspace\\research_bot\\main.py --ticker {종목명}"
    triggers: ["종목 조회", "리포트 조회"]

  query:
    description: "자연어 질문 응답"
    command: "python C:\\workspace\\research_bot\\main.py --query \"{질문}\""
    triggers: ["상향 몇건", "하향 몇건", "투자의견"]

  new_coverage:
    description: "신규 커버리지 종목 조회"
    command: "python C:\\workspace\\research_bot\\main.py --new"
    triggers: ["신규 커버리지", "새로 나온 종목"]

  batch:
    description: "수동 크롤링 실행"
    command: "python C:\\workspace\\research_bot\\main.py --batch"
    triggers: ["크롤링 실행", "리서치 수집"]
